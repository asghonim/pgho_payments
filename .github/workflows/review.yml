name: Review

on:
  pull_request:

permissions:
  id-token: write # Required for requesting the JWT OIDC token
  contents: read

jobs:
  claude:
    name: Claude Review
    runs-on: ubuntu-latest
    steps:
       - name: Checkout Code
         uses: actions/checkout@v4
       
       - name: Analyze PR
         uses: anthropics/claude-code-action@v1
         with:
            # Providing a prompt tells the v1 action to run autonomously
            prompt: |
              Thoroughly review the code changes in this Pull Request. 
              Identify performance bottlenecks, logic bugs, or security liabilities.
              Leave concise markdown suggestions where applicable.
