name: Test

on:
  pull_request:

jobs:
  test:
    name: Database Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v4
        with:
          just-version: '1.46.0'
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Download and Install dbdev CLI
        run: |
          DBDEV_DEB=./dbdev.deb
          DBDEV_SHA256=d3aca68584f402c2192d2946acdd081a189851505be38ceaee6418340a335b11

          curl -fsSL -o "$DBDEV_DEB" https://github.com/supabase/dbdev/releases/download/v0.1.7/dbdev-v0.1.7-linux-amd64.deb
          echo "$DBDEV_SHA256  $DBDEV_DEB" | sha256sum -c -
          sudo dpkg -i "$DBDEV_DEB"
          rm "$DBDEV_DEB"

      - name: Verify dbdev Installation
        run: dbdev --version
      - run: just start
      - run: just install
      - run: just add
      - run: just migrate
      - run: just test